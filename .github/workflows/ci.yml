name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Verify CLI version
        run: python -m ds2.cli version

      - name: Run tests
        run: python -m pytest

      - name: Regenerate demo artifacts
        run: python -m ds2.cli scan examples/fastapi_app --out artifacts/demo

      - name: Validate demo JSON
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in [
              Path("artifacts/demo/ds2_graph.json"),
              Path("artifacts/demo/ds2_receipt.json"),
          ]:
              json.loads(path.read_text(encoding="utf-8"))

          print("json-ok")
          PY
